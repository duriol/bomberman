<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bomberman</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    /* Desktop: game-canvas fills the viewport; Phaser Scale.FIT centers within it */
    #game-canvas {
      width: 100%;
      height: 100%;
    }

    #mobile-controls { display: none; }

    /* ── Mobile portrait (touch devices) ──────────────────────────── */
    @media (orientation: portrait) and (pointer: coarse) {
      body { flex-direction: column; }

      #game-canvas {
        flex: 1 1 auto;
        height: auto;
        min-height: 0;
        width: 100%;
      }

      #mobile-controls {
        display: flex;
        width: 100%;
        flex: 0 0 200px;
        background: #0c0c1e;
        border-top: 2px solid #1e2a4a;
        padding: 16px 28px;
        align-items: center;
        justify-content: space-between;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      /* ── 8-direction pad ───────────────────────────────────────── */
      #joystick-zone {
        width: 220px;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #joystick-base {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), rgba(18,27,52,0.86));
        border: 2px solid rgba(185, 210, 255, 0.25);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 26px rgba(6, 10, 24, 0.95), 0 7px 22px rgba(0,0,0,0.42);
      }

      #joystick-base::before {
        content: '';
        position: absolute;
        inset: 12px;
        border-radius: 50%;
        border: 1px solid rgba(180, 205, 255, 0.16);
        pointer-events: none;
      }

      .joystick-arrow {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 30px;
        height: 30px;
        transform: translate(-50%, -50%) translate(var(--tx), var(--ty));
        transition: transform 0.08s ease;
        pointer-events: none;
      }

      .joystick-arrow::before {
        content: '';
        position: absolute;
        inset: 3px;
        clip-path: polygon(50% 6%, 96% 94%, 4% 94%);
        background: rgba(226, 236, 255, 0.9);
        transform: rotate(var(--rot));
        filter: drop-shadow(0 1px 2px rgba(0,0,0,0.45));
      }

      .joystick-arrow[data-index="1"]::before,
      .joystick-arrow[data-index="3"]::before,
      .joystick-arrow[data-index="5"]::before,
      .joystick-arrow[data-index="7"]::before {
        background: transparent;
        box-shadow: inset 0 0 0 2px rgba(226, 236, 255, 0.9);
      }

      .joystick-arrow.active {
        transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(1.08);
      }

      .joystick-arrow.active::before {
        background: #8ce8ff;
        box-shadow: none;
      }

      #joystick-center {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #1c273d, #060d1e);
        border: 2px solid rgba(219, 232, 255, 0.18);
        position: absolute;
        left: 50%;
        top: 50%;
        pointer-events: none;
        transform: translate(calc(-50% + var(--center-offset-x, 0px)), calc(-50% + var(--center-offset-y, 0px)));
        transition: transform 0.09s ease-out;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.65), 0 3px 9px rgba(0,0,0,0.45);
      }

      /* ── Buttons ───────────────────────────────────────────────── */
      #buttons-area {
        position: relative;
        width: 188px;
        height: 188px;
      }

      .mobile-btn {
        position: absolute;
        width: 74px;
        height: 74px;
        border-radius: 50%;
        border: none;
        outline: none;
        font-size: 24px;
        font-family: monospace;
        color: #f2f8ff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        box-shadow: 0 5px 18px rgba(0,0,0,0.55), inset 0 1px 1px rgba(255,255,255,0.18);
        transition: transform 0.07s, box-shadow 0.07s;
        transform: var(--btn-transform);
      }

      .mobile-btn.pressed {
        transform: var(--btn-transform) scale(0.86);
        box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      }

      /* .mobile-btn::after eliminado para quitar textos adicionales */

      #btn-a4 {
        left: 50%;
        top: 0;
        --btn-transform: translateX(-50%);
        background: radial-gradient(circle at 38% 32%, #8797ff, #394cb0);
      }

      #btn-a1 {
        left: 50%;
        bottom: 0;
        --btn-transform: translateX(-50%);
        background: radial-gradient(circle at 38% 32%, #ff7e59, #b53a24);
      }

      #btn-a3 {
        left: 0;
        top: 50%;
        --btn-transform: translateY(-50%);
        background: radial-gradient(circle at 38% 32%, #ffd679, #b07b18);
      }

      #btn-a2 {
        right: 0;
        top: 50%;
        --btn-transform: translateY(-50%);
        background: radial-gradient(circle at 38% 32%, #88f3ff, #1c85a5);
      }
    }
  </style>
</head>
<body>
  <div id="game-canvas"></div>

  <div id="mobile-controls">
    <div id="joystick-zone">
      <div id="joystick-base">
        <div class="joystick-arrow" data-index="6" style="--tx: 0px; --ty: -90px; --rot: 0deg;"></div>
        <div class="joystick-arrow" data-index="7" style="--tx: 64px; --ty: -64px; --rot: 45deg;"></div>
        <div class="joystick-arrow" data-index="0" style="--tx: 90px; --ty: 0px; --rot: 90deg;"></div>
        <div class="joystick-arrow" data-index="1" style="--tx: 64px; --ty: 64px; --rot: 135deg;"></div>
        <div class="joystick-arrow" data-index="2" style="--tx: 0px; --ty: 90px; --rot: 180deg;"></div>
        <div class="joystick-arrow" data-index="3" style="--tx: -64px; --ty: 64px; --rot: 225deg;"></div>
        <div class="joystick-arrow" data-index="4" style="--tx: -90px; --ty: 0px; --rot: 270deg;"></div>
        <div class="joystick-arrow" data-index="5" style="--tx: -64px; --ty: -64px; --rot: 315deg;"></div>
        <div id="joystick-center"></div>
      </div>
    </div>
    <div id="buttons-area">
      <button class="mobile-btn" id="btn-a4">4</button>
      <button class="mobile-btn" id="btn-a3">3</button>
      <button class="mobile-btn" id="btn-a2">2</button>
      <button class="mobile-btn" id="btn-a1">1</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
     /* ── Mobile virtual controls ──────────────────────────────────
       Writes to window._mobileJoystick and window._mobileBtns.
       InputManager.getState(0) reads + clears these each frame.
    ─────────────────────────────────────────────────────────────── */
    (function () {
      'use strict';

      window._mobileJoystick = { up: false, down: false, left: false, right: false, vx: 0, vy: 0 };
      window._mobileBtns     = {
        a1: false,
        a2: false,
        a3: false,
        a4: false,
        // legacy aliases kept during migration
        bomb: false,
        action: false,
      };

      var zone      = document.getElementById('joystick-zone');
      var base      = document.getElementById('joystick-base');
      var arrows    = Array.prototype.slice.call(base.querySelectorAll('.joystick-arrow'));
      var centerDot = document.getElementById('joystick-center');
      var btnA1 = document.getElementById('btn-a1');
      var btnA2 = document.getElementById('btn-a2');
      var btnA3 = document.getElementById('btn-a3');
      var btnA4 = document.getElementById('btn-a4');

      var DEAD = 16;      // neutral center radius, px
      var CENTER_DRIFT = 20;
      var DIAG = Math.SQRT1_2;
      var DIRS = [
        { up: false, down: false, left: false, right: true,  vx: 1,     vy: 0 },
        { up: false, down: true,  left: false, right: true,  vx: DIAG,  vy: DIAG },
        { up: false, down: true,  left: false, right: false, vx: 0,     vy: 1 },
        { up: false, down: true,  left: true,  right: false, vx: -DIAG, vy: DIAG },
        { up: false, down: false, left: true,  right: false, vx: -1,    vy: 0 },
        { up: true,  down: false, left: true,  right: false, vx: -DIAG, vy: -DIAG },
        { up: true,  down: false, left: false, right: false, vx: 0,     vy: -1 },
        { up: true,  down: false, left: false, right: true,  vx: DIAG,  vy: -DIAG },
      ];
      var touchId = null;
      var activeDir = null;
      var cx = 0, cy = 0;

      function updateCenter() {
        var r = base.getBoundingClientRect();
        cx = r.left + r.width  * 0.5;
        cy = r.top  + r.height * 0.5;
      }

      function applyDirection(index) {
        if (activeDir === index) return;
        activeDir = index;

        arrows.forEach(function (el) {
          var isActive = Number(el.getAttribute('data-index')) === index;
          el.classList.toggle('active', isActive);
        });

        var j = window._mobileJoystick;
        if (index === null || index < 0 || index >= DIRS.length) {
          j.vx = 0;
          j.vy = 0;
          j.up = j.down = j.left = j.right = false;
          centerDot.style.setProperty('--center-offset-x', '0px');
          centerDot.style.setProperty('--center-offset-y', '0px');
          return;
        }

        var d = DIRS[index];
        j.vx = d.vx;
        j.vy = d.vy;
        j.up = d.up;
        j.down = d.down;
        j.left = d.left;
        j.right = d.right;
        centerDot.style.setProperty('--center-offset-x', (d.vx * CENTER_DRIFT) + 'px');
        centerDot.style.setProperty('--center-offset-y', (d.vy * CENTER_DRIFT) + 'px');
      }

      function updateDirection(tx, ty) {
        var dx   = tx - cx;
        var dy   = ty - cy;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < DEAD) {
          applyDirection(null);
          return;
        }

        var angle = Math.atan2(dy, dx);
        var step  = Math.PI / 4;
        var index = Math.round(angle / step);
        index = (index + 8) % 8;
        applyDirection(index);
      }

      zone.addEventListener('touchstart', function (e) {
        e.preventDefault();
        if (touchId !== null) return;
        var t = e.changedTouches[0];
        touchId = t.identifier;
        updateCenter();
        updateDirection(t.clientX, t.clientY);
      }, { passive: false });

      zone.addEventListener('touchmove', function (e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === touchId) {
            updateDirection(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            return;
          }
        }
      }, { passive: false });

      function endJoystick(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === touchId) {
            touchId = null;
            applyDirection(null);
            return;
          }
        }
      }
      zone.addEventListener('touchend',    endJoystick, { passive: false });
      zone.addEventListener('touchcancel', endJoystick, { passive: false });
      window.addEventListener('resize', updateCenter);
      window.addEventListener('orientationchange', updateCenter);
      updateCenter();

      /* ── Buttons ─────────────────────────────────────────────── */
      function setupBtn(el, field) {
        el.addEventListener('touchstart', function (e) {
          e.preventDefault();
          el.classList.add('pressed');
          window._mobileBtns[field] = true;   // consumed once by InputManager
        }, { passive: false });
        el.addEventListener('touchend', function (e) {
          e.preventDefault();
          el.classList.remove('pressed');
        }, { passive: false });
        el.addEventListener('touchcancel', function () {
          el.classList.remove('pressed');
        }, { passive: false });
      }

      setupBtn(btnA1, 'a1');
      setupBtn(btnA2, 'a2');
      setupBtn(btnA3, 'a3');
      setupBtn(btnA4, 'a4');
    }());
  </script>
</body>
</html>
